# Конфиг для тестов.
# В CI значения приходят из env vars (github actions services).
# Для локального запуска тестов без Testcontainers — поднять docker-compose.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/groupmatch_test}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}

logging:
  level:
    com.groupmatch: WARN
    org.springframework: WARN
    org.flywaydb: WARN

jwt:
  secret: ${JWT_SECRET:test-secret-key-must-be-at-least-256-bits-long-padding-padding}
  expiration:
    access: 900000
    refresh: 1209600000

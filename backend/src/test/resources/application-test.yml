spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/groupmatch}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
  data:
    redis:
      url: ${SPRING_REDIS_URL:redis://localhost:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 2525
    test-connection: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    com.groupmatch: WARN
    org.springframework: WARN
    org.flywaydb: WARN

jwt:
  secret: ${JWT_SECRET:test-secret-key-must-be-at-least-256-bits-long-padding-padding}
  expiration:
    access: 900000
    refresh: 1209600000

app:
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    signup: 5
    signin: 10
    refresh: 20
  cache:
    heatmap-ttl-minutes: 60
  mail:
    from: noreply@test.local
    base-url: http://localhost:3000
  email-verification:
    token-ttl-hours: 24
  password-reset:
    token-ttl-hours: 1

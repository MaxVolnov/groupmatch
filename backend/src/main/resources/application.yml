spring:
  application:
    name: groupmatch
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/groupmatch}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false
  
  redis:
    url: ${SPRING_REDIS_URL:redis://localhost:6379}

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits-12345678901234567890}
  expiration:
    access: 900000       # 15 minutes
    refresh: 1209600000  # 14 days

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.groupmatch: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
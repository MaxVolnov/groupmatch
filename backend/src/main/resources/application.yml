spring:
  application:
    name: groupmatch
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/groupmatch}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
  
  data:
    redis:
      url: ${SPRING_REDIS_URL:redis://localhost:6379}

  mail:
    host: smtp.resend.com
    port: 587
    username: resend
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits-12345678901234567890}
  expiration:
    access: 900000       # 15 minutes
    refresh: 1209600000  # 14 days

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  admin:
    email: ${ADMIN_EMAIL:}
  guest:
    retention-days: ${GUEST_RETENTION_DAYS:30}
  rate-limit:
    signup: 5
    signin: 10
    refresh: 20
  cache:
    heatmap-ttl-minutes: 60
  mail:
    from: ${MAIL_FROM:noreply@groupmatch.app}
    base-url: ${APP_BASE_URL:http://localhost:3000}
  email-verification:
    token-ttl-hours: 24
  password-reset:
    token-ttl-hours: 1

logging:
  level:
    com.groupmatch: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG